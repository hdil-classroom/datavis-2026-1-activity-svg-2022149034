<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Top 6 Busiest Seoul Subway Stations</title>

    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #f3f6f9;
            color: #202b38;
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            width: 900px;
            max-width: 100%;
            margin: 0 auto;
        }

        #header-title {
            margin: 0 0 6px;
            font-size: 26px;
        }

        .student-name {
            margin: 0 0 24px;
            color: #667382;
            font-size: 14px;
        }

        .chart-card {
            overflow-x: auto;
            padding: 24px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(31, 45, 61, 0.1);
        }

        #visualization-activity {
            display: block;
            width: 850px;
            height: 520px;
        }

        .chart-title {
            fill: #202b38;
            font-size: 20px;
            font-weight: bold;
        }

        .chart-subtitle,
        .axis-label {
            fill: #6b7785;
            font-size: 12px;
        }

        .axis {
            stroke: #aab3bd;
            stroke-width: 1;
        }

        .tick {
            stroke: #d7dde3;
            stroke-width: 1;
        }

        .tick-label {
            fill: #7b8794;
            font-size: 11px;
            text-anchor: middle;
        }

        .station-label {
            fill: #354252;
            font-size: 13px;
            text-anchor: end;
        }

        .bar {
            fill: #45a56d;
        }

        .bar.line-1 {
            fill: #355caa;
        }

        .bar.line-3 {
            fill: #ef7c41;
        }

        .value-label {
            fill: #354252;
            font-size: 12px;
            font-weight: bold;
        }

        .legend-text {
            fill: #5d6976;
            font-size: 11px;
        }
    </style>
</head>

<body>
    <main>
        <h1 id="header-title">In-Class Activity: SVG Bar Chart</h1>
        <p class="student-name">Student ID: 2022149034</p>

        <div class="chart-card">
            <svg id="visualization-activity" viewBox="0 0 850 520"
                role="img" aria-labelledby="chart-title chart-description">
                <title id="chart-title">Top 6 Busiest Stations on December 1, 2024</title>
                <desc id="chart-description">
                    Horizontal bar chart comparing boarding passengers at six Seoul subway stations.
                </desc>

                <g class="headings">
                    <text class="chart-title" x="20" y="28">
                        Top 6 Busiest Stations on Dec 1, 2024
                    </text>
                    <text class="chart-subtitle" x="20" y="49">
                        Ranked by boarding passengers
                    </text>
                </g>

                <g class="x-axis">
                    <line class="axis" x1="225" y1="438" x2="805" y2="438"></line>
                    <line class="tick" x1="225" y1="438" x2="225" y2="444"></line>
                    <line class="tick" x1="370" y1="438" x2="370" y2="444"></line>
                    <line class="tick" x1="515" y1="438" x2="515" y2="444"></line>
                    <line class="tick" x1="660" y1="438" x2="660" y2="444"></line>
                    <line class="tick" x1="805" y1="438" x2="805" y2="444"></line>

                    <text class="tick-label" x="225" y="460">0</text>
                    <text class="tick-label" x="370" y="460">20,000</text>
                    <text class="tick-label" x="515" y="460">40,000</text>
                    <text class="tick-label" x="660" y="460">60,000</text>
                    <text class="tick-label" x="805" y="460">80,000</text>
                    <text class="axis-label" x="515" y="485" text-anchor="middle">
                        Boarding passengers
                    </text>
                </g>

                <g class="bars">
                    <g>
                        <text class="station-label" x="210" y="100">Hongdae (Line 2)</text>
                        <rect class="bar" x="225" y="80" width="528.34" height="28" rx="4"></rect>
                        <text class="value-label" x="763" y="100">72,874</text>
                    </g>
                    <g>
                        <text class="station-label" x="210" y="158">Jamsil (Line 2)</text>
                        <rect class="bar" x="225" y="138" width="457.37" height="28" rx="4"></rect>
                        <text class="value-label" x="692" y="158">63,085</text>
                    </g>
                    <g>
                        <text class="station-label" x="210" y="216">Express Bus Terminal (Line 3)</text>
                        <rect class="bar line-3" x="225" y="196" width="388.35" height="28" rx="4"></rect>
                        <text class="value-label" x="623" y="216">53,566</text>
                    </g>
                    <g>
                        <text class="station-label" x="210" y="274">Seoul Station (Line 1)</text>
                        <rect class="bar line-1" x="225" y="254" width="294.47" height="28" rx="4"></rect>
                        <text class="value-label" x="529" y="274">40,617</text>
                    </g>
                    <g>
                        <text class="station-label" x="210" y="332">Sillim (Line 2)</text>
                        <rect class="bar" x="225" y="312" width="277.46" height="28" rx="4"></rect>
                        <text class="value-label" x="512" y="332">38,271</text>
                    </g>
                    <g>
                        <text class="station-label" x="210" y="390">Sindorim (Line 2)</text>
                        <rect class="bar" x="225" y="370" width="272.03" height="28" rx="4"></rect>
                        <text class="value-label" x="507" y="390">37,521</text>
                    </g>
                </g>

                <g class="legend" transform="translate(225, 505)">
                    <rect class="bar line-1" width="12" height="12" rx="2"></rect>
                    <text class="legend-text" x="18" y="10">Line 1</text>
                    <rect class="bar" x="72" width="12" height="12" rx="2"></rect>
                    <text class="legend-text" x="90" y="10">Line 2</text>
                    <rect class="bar line-3" x="144" width="12" height="12" rx="2"></rect>
                    <text class="legend-text" x="162" y="10">Line 3</text>
                </g>
            </svg>
        </div>
    </main>
</body>
</html>
